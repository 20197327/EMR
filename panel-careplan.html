<!-- ════════════════════════════════════════
     panel-careplan.html
     Nursing Care Plan (NCP) — NANDA-based
     ════════════════════════════════════════ -->
<div class="panel" id="panel-careplan">
  <div class="card">

    <div class="card-hd">
      <span class="card-title">Nursing Care Plan</span>
      <div style="display:flex;gap:8px">
        <button class="btn btn-sm" onclick="openTplModal()">+ From Template</button>
        <button class="btn btn-sm btn-teal" onclick="addNcpBlank()">+ Custom Diagnosis</button>
      </div>
    </div>

    <div id="ncpList"></div>

    <div id="ncpEmpty" class="empty">
      <svg viewBox="0 0 20 20" fill="none">
        <path d="M10 17s-7-4.5-7-9a5 5 0 0110 0 5 5 0 0110 0c0 4.5-7 9-7 9z"
              stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
      </svg>
      <p>No nursing diagnoses yet.<br>Add a template or create a custom diagnosis above.</p>
    </div>

  </div>
</div>
