<!-- ════════════════════════════════════════
     panel-dashboard.html
     Patient Dashboard — Demographics, Allergies,
     Code Status, Chief Complaints
     ════════════════════════════════════════ -->
<div class="panel on" id="panel-dashboard">
  <div class="g2">

    <!-- Demographics -->
    <div class="card">
      <div class="card-hd">
        <span class="card-title">Demographics</span>
        <span class="badge b-blu" id="statusBadge">New Record</span>
      </div>

      <div class="f">
        <label>Full Name</label>
        <input type="text" id="d_name" placeholder="Last, First Middle" oninput="refreshTopbar()">
      </div>

      <div class="g2" style="margin-bottom:10px">
        <div class="f" style="margin:0">
          <label>Date of Birth</label>
          <input type="date" id="d_dob" oninput="refreshTopbar()">
        </div>
        <div class="f" style="margin:0">
          <label>Sex</label>
          <select id="d_sex">
            <option value="">—</option>
            <option>Female</option><option>Male</option>
            <option>Non-binary</option><option>Other</option>
          </select>
        </div>
      </div>

      <div class="g2" style="margin-bottom:10px">
        <div class="f" style="margin:0">
          <label>Blood Type</label>
          <select id="d_blood">
            <option value="">—</option>
            <option>A+</option><option>A−</option>
            <option>B+</option><option>B−</option>
            <option>O+</option><option>O−</option>
            <option>AB+</option><option>AB−</option>
            <option>Unknown</option>
          </select>
        </div>
        <div class="f" style="margin:0">
          <label>Weight (kg)</label>
          <input type="number" id="d_weight" placeholder="kg" min="0" max="500">
        </div>
        <div class="f" style="margin:0">
          <label>Height (cm)</label>
          <input type="number" id="d_height" placeholder="cm" min="0" max="500">
        </div>
      </div>

      <div class="g2" style="margin-bottom:10px">
        <div class="f" style="margin:0">
          <label>MRN</label>
          <input type="text" id="d_mrn" placeholder="Auto-generated" oninput="refreshTopbar()">
        </div>
        <div class="f" style="margin:0">
          <label>Room / Bed</label>
          <input type="text" id="d_room" placeholder="e.g. 302-A" oninput="refreshTopbar()">
        </div>
      </div>

      <div class="g2" style="margin-bottom:10px">
        <div class="f" style="margin:0">
          <label>Attending Physician</label>
          <input type="text" id="d_doctor" placeholder="Dr. ..." oninput="refreshTopbar()">
        </div>
        <div class="f" style="margin:0">
          <label>Admission Date</label>
          <input type="date" id="d_admit">
        </div>
      </div>

      <div class="f">
        <label>Emergency Contact</label>
        <input type="text" id="d_contact" placeholder="Name (Relationship) — Phone number">
      </div>

      <div class="f">
        <label>Admission Status</label>
        <select id="d_status" onchange="refreshTopbar()">
          <option value="">— Select —</option>
          <option>Admitted</option><option>Observation</option>
          <option>Emergency</option><option>Outpatient</option>
          <option>Discharged</option>
        </select>
      </div>

      <div class="f">
        <label>Primary Diagnosis / Reason for Admission</label>
        <textarea id="d_diag" placeholder="Primary diagnosis or reason for this admission..."></textarea>
      </div>
    </div>

    <!-- Allergies, Code Status, Complaints -->
    <div class="card">
      <div class="card-hd">
        <span class="card-title">Allergies &amp; Intolerances</span>
        <span class="badge b-red" id="allergyCount">0 alerts</span>
      </div>

      <div class="fl">Allergies</div>
      <div class="tag-list" id="allergyList" style="margin-bottom:4px"></div>
      <div class="tag-row">
        <input type="text" id="allergyIn" placeholder="Drug / substance — reaction type"
               onkeydown="if(event.key==='Enter')addTag('a')">
        <button class="btn btn-sm" onclick="addTag('a')">+ Add</button>
      </div>

      <div class="divider" style="margin-top:14px">Intolerances</div>
      <div class="tag-list" id="intoleranceList" style="margin-bottom:4px"></div>
      <div class="tag-row">
        <input type="text" id="intoleranceIn" placeholder="Food / substance — reaction"
               onkeydown="if(event.key==='Enter')addTag('i')">
        <button class="btn btn-sm" onclick="addTag('i')">+ Add</button>
      </div>

      <div class="divider">Code Status</div>
      <div class="f">
        <select id="d_code">
          <option value="">— Select code status —</option>
          <option>Full Code</option>
          <option>DNR — Do Not Resuscitate</option>
          <option>DNI — Do Not Intubate</option>
          <option>DNR/DNI</option>
          <option>Comfort Care Only</option>
        </select>
      </div>
      <div class="f">
        <label>Code Status Notes</label>
        <textarea id="d_codeNotes"
                  placeholder="Advance directives, legal documents on file, family discussions..."></textarea>
      </div>

      <div class="divider">Chief Complaints</div>
      <div id="complaintList"></div>
      <div style="display:grid;grid-template-columns:1fr 80px 100px auto;gap:7px;align-items:end;margin-top:8px">
        <div class="f" style="margin:0">
          <label>Complaint / Problem</label>
          <input type="text" id="cIn" placeholder="Describe the complaint..."
                 onkeydown="if(event.key==='Enter')addComplaint()">
        </div>
        <div class="f" style="margin:0">
          <label>NRS Pain</label>
          <input type="number" id="cPain" min="0" max="10" placeholder="0–10">
        </div>
        <div class="f" style="margin:0">
          <label>Priority</label>
          <select id="cPri">
            <option value="priority">Priority</option>
            <option value="monitor">Monitor</option>
            <option value="chronic">Chronic</option>
            <option value="resolved">Resolved</option>
          </select>
        </div>
        <button class="btn btn-sm btn-teal" onclick="addComplaint()" style="height:32px;align-self:end">+ Add</button>
      </div>
    </div>

  </div>
</div>
