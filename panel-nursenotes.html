<!-- ════════════════════════════════════════
     panel-nursenotes.html
     Nurse's Notes — FDAR Documentation
     (Focus · Data · Action · Response)
     ════════════════════════════════════════ -->
<div class="panel" id="panel-nursenotes">
  <div class="card">

    <div class="card-hd">
      <span class="card-title">Nurse's Notes</span>
      <div style="display:flex;gap:8px;align-items:center">
        <span class="badge b-pur" style="font-size:10px">FDAR Format</span>
        <button class="btn btn-sm btn-teal" onclick="addNurseNote()">+ New Note</button>
      </div>
    </div>

    <!-- FDAR legend -->
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;padding:10px 12px;background:var(--inp);border-radius:8px;border:.5px solid var(--border)">
      <span style="font-size:11px;color:var(--muted);font-weight:600;align-self:center">FDAR:&nbsp;</span>
      <span style="font-size:11px;display:flex;align-items:center;gap:5px">
        <span class="fdar-pill pill-f" style="width:18px;height:18px;border-radius:5px;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;font-family:'IBM Plex Mono',monospace;background:var(--blu-bg);color:var(--blu)">F</span>
        <strong>Focus</strong> — the nursing concern or problem
      </span>
      <span style="font-size:11px;display:flex;align-items:center;gap:5px">
        <span style="width:18px;height:18px;border-radius:5px;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;font-family:'IBM Plex Mono',monospace;background:var(--grn-bg);color:var(--grn)">D</span>
        <strong>Data</strong> — objective &amp; subjective findings
      </span>
      <span style="font-size:11px;display:flex;align-items:center;gap:5px">
        <span style="width:18px;height:18px;border-radius:5px;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;font-family:'IBM Plex Mono',monospace;background:var(--ora-bg);color:var(--ora)">A</span>
        <strong>Action</strong> — interventions performed
      </span>
      <span style="font-size:11px;display:flex;align-items:center;gap:5px">
        <span style="width:18px;height:18px;border-radius:5px;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;font-family:'IBM Plex Mono',monospace;background:var(--pur-bg);color:var(--pur)">R</span>
        <strong>Response</strong> — patient's outcome
      </span>
    </div>

    <!-- Notes list (rendered by JS) -->
    <div id="nnList"></div>

    <!-- Empty state -->
    <div id="nnEmpty" class="empty">
      <svg viewBox="0 0 20 20" fill="none">
        <path d="M5 3h10a1 1 0 011 1v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4a1 1 0 011-1z"
              stroke="currentColor" stroke-width="1.3"/>
        <path d="M7 7h6M7 10h6M7 13h4"
              stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
      <p>No nurse's notes yet.<br>Click <strong>+ New Note</strong> to add a FDAR entry.</p>
    </div>

  </div>
</div>
